<app-navbar 
  appName="Clark Liu" 
  (menuClicked)="onMenuClicked($event)" 
/>
<!-- **`(menuClicked)`** → 監聽子層發出的事件名稱
**`onMenuClicked($event)`** → 觸發當前層（App）自己的方法
**`$event`** → 子層 `emit()` 傳出來的值，這裡是 `'home'` 或 `'about'` -->
<p>現在のページ：{{ currentPage }}</p>

<h1>{{ title() }}</h1>
<p>はじめてのAngular</p>

<!-- app.html -->


<!-- track 是告訴 Angular「用什麼來識別每個元素」。Angular 需要知道「哪些是舊的，哪些是新的」，才能只更新有變化的部分，不用整個清單重新渲染。 track product.id 就是說：用 id 來識別每個元素 -->

<button (click)="toggleLogin()">
  {{ isLoggedIn ? 'ログアウト' : 'ログイン' }}
</button>

@if (isLoggedIn) {
  <ul>
  @for (product of products; track product.id) {
    <li>{{ product.name }} - {{ product.price }}円 - 
      @if (product.inStock) {
        在庫あり
      } @else {
        在庫なし
      }
      </li>  
    }
  </ul>
  } @else {
  <p>ログインしてください</p>
}
