<!DOCTYPE html>
<html>
<head>
  <style>
    .container {
      flex-direction: column;  /* 垂直方向に配置 */
      display: flex;
      justify-content: flex-start;
      align-items: center;
      height: 100vh;        /* 整個視窗高度 */
      background: #f0f0f0;
    }

    .box {
      background: steelblue;
      color: white;
      padding: 32px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box">真ん中に置かれた！</div>
  </div>
</body>
</html>
