const stats = {
    max: 56.78,
    standard_deviation: 4.34,
    median: 34.54,
    mode: 23.87,
    min: -0.75,
    average: 35.85
};

// 傳入整個 stats
console.log(half(stats));

function half({ max, min }) {
    // max = 56.78  ← 自動從 stats.max 取出
    // min = -0.75  ← 自動從 stats.min 取出
    // 其他欄位（median, mode...）直接忽略
    return (max + min) / 2.0; // (56.78 + (-0.75)) / 2 = 28.015
}

//  Object Method Shorthand（物件方法簡寫）！
const bicycle = {
    gear: 2,
    setGear(newGear) {
        this.gear = newGear;
    }
};

bicycle.setGear(3);

//  Constructor Function（建構函式）舊寫法 - Constructor Function（ES5）
var SpaceShuttle = function(targetPlanet){
    this.targetPlanet = targetPlanet;
}
var zeus = new SpaceShuttle("Jupiter");
console.log(zeus.targetPlanet);

// 新寫法 - class（ES6，現代寫法）
class SpaceShuttle {
    constructor(targetPlanet) {
        this.targetPlanet = targetPlanet;
    }
}

function makeClass() {
    class Vegetable {
        constructor(name) {
            this.name = name;
        }
    }
    return Vegetable;
}
const Vegetable = makeClass();
const carrot = new Vegetable('carrot');
console.log(carrot.name); // 'carrot'


class Thermostat {
    constructor(temp) {
        this._temp = 5/9 * (temp - 32);
    }
    get temperature() {
        return this._temp;
    }
    set temperature(updatedTemp) {
        this._temp = updatedTemp;
    }
}

const thermos = new Thermostat(76); // 傳入華氏 76°F
console.log(thermos.temperature);   // 24.444...

thermos.temperature = 26;           // 設定新溫度
console.log(thermos.temperature);   // 26
